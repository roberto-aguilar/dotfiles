# Require public key authentication for incoming SSH connections.
# Loaded by sshd via `Include /etc/ssh/sshd_config.d/*` in the stock
# macOS /etc/ssh/sshd_config. The `200-` prefix loads after the macOS
# default drop-in (`100-macos.conf`); first-match-wins semantics do
# not apply to these keywords because the defaults do not set them.
PasswordAuthentication no
KbdInteractiveAuthentication no
PubkeyAuthentication yes
